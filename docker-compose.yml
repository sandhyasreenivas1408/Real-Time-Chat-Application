version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: chat-app-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    container_name: chat-app-backend
    ports:
      - "3001:3001"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/chat-app?authSource=admin
      JWT_SECRET: your_jwt_secret_key_here
      NODE_ENV: development
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongo_data: